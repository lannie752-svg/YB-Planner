<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一二布布 日历</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fef8f3;
  --white:#ffffff;
  --pink:#f4a8a0;
  --pink-d:#d97068;
  --pink-s:#fde8e6;
  --green:#8ec48a;
  --green-d:#5a9456;
  --green-s:#e4f2e2;
  --lav:#b4a8d8;
  --lav-s:#eceaf8;
  --yel:#e8c870;
  --yel-s:#fdf4d8;
  --blue:#88c4d8;
  --blue-s:#dff0f8;
  --ink:#2e2016;
  --ink2:#6b4c3c;
  --ink3:#a88070;
  --line:#f0ddd8;
  --r:14px;
  --sh:0 2px 12px rgba(46,32,22,.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito','Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);}

/* ── LOGIN SCREEN ── */
#loginScreen {
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#fde8e6 0%,#fef8f3 50%,#e4f2e2 100%);
}
.login-box {
  background:var(--white);border-radius:24px;padding:40px 36px;
  box-shadow:0 8px 40px rgba(46,32,22,.15);
  text-align:center;max-width:360px;width:90%;
}
.login-stickers{display:flex;justify-content:center;gap:8px;margin-bottom:16px;}
.login-stickers img{width:60px;height:60px;object-fit:contain;border-radius:50%;animation:bobble 2.5s ease-in-out infinite;}
.login-stickers img:nth-child(2){animation-delay:.5s;}
.login-stickers img:nth-child(3){animation-delay:1s;}
@keyframes bobble{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.login-title{font-size:1.6rem;font-weight:900;color:var(--pink-d);margin-bottom:6px;}
.login-sub{font-size:.9rem;font-weight:600;color:var(--ink2);margin-bottom:28px;line-height:1.5;}
.google-btn {
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:13px 20px;border-radius:12px;
  background:var(--white);border:2px solid var(--line);
  font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:800;
  color:var(--ink);cursor:pointer;transition:all .2s;
}
.google-btn:hover{background:var(--pink-s);border-color:var(--pink);transform:translateY(-2px);box-shadow:0 4px 16px rgba(217,112,104,.2);}
.google-btn img{width:22px;height:22px;}
.login-note{font-size:.74rem;color:var(--ink3);font-weight:600;margin-top:16px;line-height:1.6;}
#loginError{color:var(--pink-d);font-size:.8rem;font-weight:700;margin-top:10px;display:none;}

/* ── LOADING ── */
#loadingScreen {
  position:fixed;inset:0;z-index:999;display:none;
  align-items:center;justify-content:center;
  background:var(--bg);flex-direction:column;gap:14px;
}
#loadingScreen.show{display:flex;}
.loader{width:44px;height:44px;border:4px solid var(--pink-s);border-top-color:var(--pink-d);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-size:.9rem;font-weight:700;color:var(--ink2);}

/* ── APP (hidden until logged in) ── */
#app{display:none;flex-direction:column;height:100vh;}
#app.show{display:flex;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:12px;padding:10px 20px;background:var(--white);border-bottom:2px solid var(--line);flex-shrink:0;z-index:100;}
.logo{display:flex;align-items:center;gap:8px;font-size:1.1rem;font-weight:800;color:var(--pink-d);}
.logo img{width:34px;height:34px;border-radius:50%;object-fit:contain;transition:transform .25s;cursor:pointer;}
.logo img:hover{transform:scale(1.2) rotate(-10deg);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.today-badge{background:var(--pink-s);color:var(--pink-d);font-size:.82rem;font-weight:800;padding:6px 14px;border-radius:20px;}
.user-area{display:flex;align-items:center;gap:8px;}
.user-avatar{width:32px;height:32px;border-radius:50%;border:2px solid var(--pink);object-fit:cover;}
.user-name{font-size:.78rem;font-weight:800;color:var(--ink2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.signout-btn{background:var(--line);border:none;border-radius:8px;padding:5px 11px;font-family:'Nunito',sans-serif;font-size:.74rem;font-weight:800;color:var(--ink2);cursor:pointer;transition:all .18s;}
.signout-btn:hover{background:var(--pink-s);color:var(--pink-d);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green-d);flex-shrink:0;transition:background .3s;}
.sync-dot.syncing{background:var(--yel);animation:pulse .8s ease-in-out infinite;}
.sync-dot.error{background:var(--pink-d);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── LAYOUT ── */
.body{display:flex;flex:1;overflow:hidden;}

/* ── LEFT: CALENDAR ── */
.cal-col{display:flex;flex-direction:column;width:62%;border-right:2px solid var(--line);overflow:hidden;}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;flex-shrink:0;}
.cal-nav-group{display:flex;align-items:center;gap:10px;}
.mnav{background:var(--pink-s);border:none;border-radius:50%;width:34px;height:34px;font-size:1.1rem;cursor:pointer;color:var(--pink-d);font-weight:800;transition:all .18s;}
.mnav:hover{background:var(--pink-d);color:#fff;}
.mmonth{font-size:1.25rem;font-weight:900;color:var(--ink);min-width:130px;text-align:center;}
.goal-strip{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:0 20px 10px;}
.goal-strip::-webkit-scrollbar{display:none;}
.g-chip{display:flex;align-items:center;gap:6px;background:var(--white);border:2px solid var(--green);border-radius:24px;padding:5px 12px;white-space:nowrap;font-size:.78rem;font-weight:700;color:var(--ink2);flex-shrink:0;}
.g-chip-bar{width:44px;height:5px;background:var(--green-s);border-radius:5px;display:inline-block;overflow:hidden;vertical-align:middle;}
.g-chip-fill{height:100%;background:var(--green-d);border-radius:5px;}
.cal-days-head{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 14px;flex-shrink:0;}
.dh{text-align:center;font-size:.78rem;font-weight:800;color:var(--ink3);padding:4px 0;letter-spacing:.04em;}
.cal-grid-scroll{flex:1;overflow:hidden;padding:4px 14px 14px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;height:100%;}

/* CELL */
.cell{border-radius:10px;background:var(--white);border:2px solid transparent;cursor:pointer;transition:border-color .15s,transform .1s;display:flex;flex-direction:column;padding:6px 7px 4px;position:relative;overflow:hidden;min-height:0;}
.cell:hover{border-color:var(--pink);transform:scale(1.02);}
.cell.today{border-color:var(--pink-d);box-shadow:0 0 0 2px var(--pink-s);}
.cell.selected{border-color:var(--pink-d);background:var(--pink-s);}
.cell.empty{background:transparent;border-color:transparent;cursor:default;}
.cell.empty:hover{transform:none;}
.cell-mood-fill{position:absolute;inset:0;opacity:.22;border-radius:8px;pointer-events:none;z-index:0;}
.dnum{font-size:.88rem;font-weight:900;line-height:1;flex-shrink:0;position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.dnum-n{color:var(--ink);}
.cell.today .dnum-n{color:var(--pink-d);}
.dnum-stickers{display:flex;gap:2px;}
.ds{width:16px;height:16px;object-fit:contain;cursor:pointer;}
.cell-body{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden;position:relative;z-index:1;}
.ctag{font-size:.62rem;font-weight:800;line-height:1.4;border-radius:4px;padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.ctag.ev{background:rgba(244,168,160,.25);color:#c04840;border-left:2px solid var(--pink-d);}
.ctag.td{background:rgba(142,196,138,.25);color:#3a7436;border-left:2px solid var(--green-d);}
.ctag.hl{background:rgba(232,200,112,.3);color:#8a6010;border-left:2px solid var(--yel);}
.ctag.more{color:var(--ink3);font-size:.55rem;padding:1px 4px;background:none;border:none;}

/* ── RIGHT: ACTIVITY PANEL ── */
.act-col{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.act-header{padding:14px 20px 10px;flex-shrink:0;border-bottom:2px solid var(--line);background:var(--white);}
.act-date{font-size:1.2rem;font-weight:900;color:var(--ink);}
.act-sub{font-size:.78rem;font-weight:700;color:var(--ink3);margin-top:2px;}
.act-tabs{display:flex;gap:4px;padding:10px 16px;flex-shrink:0;background:var(--white);border-bottom:2px solid var(--line);}
.atab{padding:7px 16px;border-radius:20px;border:none;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:800;cursor:pointer;transition:all .18s;background:transparent;color:var(--ink2);}
.atab:hover{background:var(--pink-s);color:var(--pink-d);}
.atab.on{background:var(--pink-d);color:#fff;}
.act-body{flex:1;overflow-y:auto;padding:16px;}
.act-body::-webkit-scrollbar{width:4px;}
.act-body::-webkit-scrollbar-thumb{background:var(--pink);border-radius:10px;}
.panel{display:none;flex-direction:column;gap:14px;}
.panel.on{display:flex;}
.sec{background:var(--white);border-radius:var(--r);padding:16px;box-shadow:var(--sh);}
.sec-title{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.item-row{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:10px;margin-bottom:6px;font-size:.9rem;font-weight:700;color:var(--ink);}
.item-row.ev-bg{background:var(--pink-s);}
.item-row.td-bg{background:var(--green-s);}
.item-row.hl-bg{background:var(--yel-s);}
.item-row .ir-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.item-row .ir-txt{flex:1;font-size:.88rem;}
.item-row .ir-time{font-size:.72rem;color:var(--ink3);font-weight:700;}
.ir-del{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:.9rem;padding:0 2px;transition:color .15s;}
.ir-del:hover{color:var(--pink-d);}
.chk{width:20px;height:20px;border-radius:50%;border:2.5px solid var(--green);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;background:#fff;}
.chk.on{background:var(--green-d);border-color:var(--green-d);}
.chk.on::after{content:'✓';color:#fff;font-size:.65rem;font-weight:900;}
.done-txt{text-decoration:line-through;opacity:.45;}
.add-row{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.inp{flex:1;min-width:120px;border:2px solid var(--line);border-radius:10px;padding:9px 13px;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:600;outline:none;color:var(--ink);background:var(--bg);transition:border .18s;}
.inp:focus{border-color:var(--pink-d);background:var(--white);}
.inp.sm{font-size:.8rem;padding:8px 10px;}
input[type=time].inp{width:105px;flex:none;font-size:.8rem;}
input[type=date].inp{width:148px;flex:none;font-size:.8rem;}
.btn{background:var(--pink-d);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-family:'Nunito',sans-serif;font-size:.84rem;font-weight:800;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.btn.g{background:var(--green-d);}
.btn.sm{padding:7px 13px;font-size:.78rem;}
.dots{display:flex;gap:5px;align-items:center;}
.dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s;}
.dot:hover{transform:scale(1.3);}
.dot.sel{border-color:var(--ink);}
.mood-fill-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px;}
.mf-btn{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .18s;position:relative;}
.mf-btn:hover{transform:scale(1.15);}
.mf-btn.sel::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;color:rgba(0,0,0,.5);}
.mf-clear{font-size:.75rem;font-weight:700;color:var(--ink3);cursor:pointer;padding:4px 8px;border-radius:8px;border:1.5px solid var(--line);background:var(--white);}
.mf-clear:hover{background:var(--pink-s);color:var(--pink-d);}
.h-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.wcup{font-size:1.4rem;cursor:pointer;filter:grayscale(.7) opacity(.35);transition:all .15s;}
.wcup.on{filter:none;transform:scale(1.1);}
.bnum{font-size:2rem;font-weight:900;color:var(--pink-d);line-height:1;}
.bsub{font-size:.7rem;color:var(--ink3);font-weight:700;}
.echip{border:2px solid var(--green);border-radius:18px;padding:5px 12px;font-size:.76rem;font-weight:800;cursor:pointer;background:#fff;color:var(--green-d);transition:all .15s;}
.echip.on{background:var(--green-d);color:#fff;border-color:var(--green-d);}
.mbtn{font-size:1.5rem;cursor:pointer;filter:grayscale(.5) opacity(.5);transition:all .18s;border-radius:8px;padding:2px;}
.mbtn:hover{filter:none;transform:scale(1.15);}
.mbtn.sel{filter:none;background:var(--pink-s);}
.note-ta{width:100%;border:2px solid var(--line);border-radius:10px;padding:10px 13px;font-family:'Nunito','Noto Sans SC',sans-serif;font-size:.86rem;font-weight:600;resize:vertical;min-height:80px;outline:none;color:var(--ink);background:var(--bg);transition:border .18s;line-height:1.65;}
.note-ta:focus{border-color:var(--pink-d);background:var(--white);}
.sl-row{display:flex;gap:8px;align-items:center;margin:5px 0;font-size:.84rem;font-weight:700;color:var(--ink2);}
.sl-row input[type=time]{border:2px solid var(--line);border-radius:9px;padding:7px 10px;font-family:'Nunito',sans-serif;font-size:.82rem;outline:none;color:var(--ink);background:var(--bg);}
.sl-row input[type=time]:focus{border-color:var(--pink-d);background:#fff;}
.g-card{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:10px;}
.g-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.g-emoji{font-size:1.3rem;}
.g-name{flex:1;font-size:.92rem;font-weight:800;}
.g-pct{font-size:.78rem;font-weight:800;color:var(--pink-d);}
.g-bar{height:8px;border-radius:8px;background:var(--pink-s);overflow:hidden;margin-bottom:4px;}
.g-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--pink),var(--pink-d));transition:width .5s;}
.g-meta{display:flex;justify-content:space-between;font-size:.72rem;color:var(--ink3);font-weight:700;}
.g-btns{display:flex;gap:4px;margin-top:8px;}
.gbtn{border:2px solid var(--line);border-radius:8px;background:#fff;padding:5px 10px;font-family:'Nunito',sans-serif;font-size:.76rem;font-weight:800;color:var(--ink2);cursor:pointer;transition:all .15s;}
.gbtn:hover{background:var(--pink-d);color:#fff;border-color:var(--pink-d);}
.cats{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.ccat{border:2px solid;border-radius:20px;padding:5px 13px;font-family:'Nunito',sans-serif;font-size:.76rem;font-weight:800;cursor:pointer;transition:all .15s;background:#fff;}
.stk-rail{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0;}
.stk-thumb{width:46px;height:46px;object-fit:contain;cursor:pointer;border-radius:10px;border:2px solid transparent;transition:all .18s;}
.stk-thumb:hover{border-color:var(--pink);background:var(--pink-s);transform:scale(1.12);}
.placed-stk{width:44px;height:44px;object-fit:contain;border-radius:8px;cursor:pointer;border:2px solid var(--line);}
.placed-stk:hover{border-color:var(--pink-d);}
.flash{display:inline-block;background:var(--green-s);color:var(--green-d);border-radius:8px;padding:3px 10px;font-size:.72rem;font-weight:800;margin-left:8px;}
.drag-ghost{position:fixed;pointer-events:none;z-index:9999;width:54px;height:54px;object-fit:contain;opacity:.8;transform:translate(-50%,-50%);display:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--pink);border-radius:10px;}
</style>
</head>
<body>

<img class="drag-ghost" id="dragGhost" src="" alt=""/>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-stickers">
      <img src="https://s3.getstickerpack.com/storage/uploads/sticker-pack/bubu-dudu-1/sticker_2.webp" onerror="this.style.display='none'" alt=""/>
      <img src="https://s3.getstickerpack.com/storage/uploads/sticker-pack/bubu-dudu-1/sticker_3.webp" onerror="this.style.display='none'" alt=""/>
      <img src="https://s3.getstickerpack.com/storage/uploads/sticker-pack/bubu-dudu-1/sticker_6.webp" onerror="this.style.display='none'" alt=""/>
    </div>
    <div class="login-title">一二布布 日历</div>
    <div class="login-sub">你的专属小日记 🌸<br/>登录后数据自动保存到云端</div>
    <button class="google-btn" onclick="signInWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"/>
      用 Google 账号登录
    </button>
    <div id="loginError">登录失败，请重试 😢</div>
    <div class="login-note">你的数据只属于你，其他人看不到 🔒<br/>使用 Firebase 安全存储</div>
  </div>
</div>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="loader"></div>
  <div class="load-txt">正在加载你的数据... 🐻</div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="topbar">
    <div class="logo">
      <img src="https://s3.getstickerpack.com/storage/uploads/sticker-pack/bubu-dudu-1/sticker_2.webp" onerror="this.style.display='none'" alt=""/>
      <img src="https://s3.getstickerpack.com/storage/uploads/sticker-pack/bubu-dudu-1/sticker_3.webp" onerror="this.style.display='none'" alt=""/>
      一二布布
    </div>
    <div class="topbar-right">
      <div class="sync-dot" id="syncDot" title="数据同步状态"></div>
      <div class="today-badge" id="topDate"></div>
      <div class="user-area">
        <img class="user-avatar" id="userAvatar" src="" alt=""/>
        <span class="user-name" id="userName"></span>
        <button class="signout-btn" onclick="signOut()">退出</button>
      </div>
    </div>
  </div>

  <div class="body">
    <!-- LEFT: CALENDAR -->
    <div class="cal-col">
      <div class="cal-header">
        <div class="cal-nav-group">
          <button class="mnav" onclick="chMonth(-1)">‹</button>
          <div class="mmonth" id="mmonth"></div>
          <button class="mnav" onclick="chMonth(1)">›</button>
        </div>
      </div>
      <div class="goal-strip" id="goalStrip"></div>
      <div class="cal-days-head">
        <div class="dh">日</div><div class="dh">一</div><div class="dh">二</div>
        <div class="dh">三</div><div class="dh">四</div><div class="dh">五</div><div class="dh">六</div>
      </div>
      <div class="cal-grid-scroll">
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>

    <!-- RIGHT: ACTIVITY PANEL -->
    <div class="act-col">
      <div class="act-header">
        <div class="act-date" id="actDate">← 点击左边日期</div>
        <div class="act-sub" id="actSub">选择一天开始记录</div>
      </div>
      <div class="act-tabs">
        <button class="atab on" onclick="switchTab('events',this)">📌 活动</button>
        <button class="atab" onclick="switchTab('todo',this)">✅ 待办</button>
        <button class="atab" onclick="switchTab('health',this)">🌸 健康</button>
        <button class="atab" onclick="switchTab('goals',this)">⭐ 目标</button>
        <button class="atab" onclick="switchTab('design',this)">🎨 设计</button>
      </div>
      <div class="act-body">

        <!-- EVENTS -->
        <div class="panel on" id="tab-events">
          <div class="sec">
            <div class="sec-title">📌 活动 & 事件</div>
            <div id="evList"></div>
            <div class="add-row">
              <input class="inp" id="evInp" placeholder="添加活动..." onkeydown="if(event.key==='Enter')addEv()"/>
              <input type="time" class="inp" id="evTime"/>
            </div>
            <div class="add-row" style="margin-top:6px;">
              <div class="dots" id="evDots"></div>
              <button class="btn sm" style="margin-left:auto;" onclick="addEv()">+ 加入</button>
            </div>
          </div>
        </div>

        <!-- TODO -->
        <div class="panel" id="tab-todo">
          <div class="sec">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1semI56vcPLySHbgquOh-STq0ukcx0ns",
  authDomain: "calendar-yb-a0d91.firebaseapp.com",
  projectId: "calendar-yb-a0d91",
  storageBucket: "calendar-yb-a0d91.firebasestorage.app",
  messagingSenderId: "297361963615",
  appId: "1:297361963615:web:ba9fb20af8849f95c539ea"
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);

let currentUser = null;
let unsubSnapshot = null;
let saveTimer = null;

// ── AUTH ──
window.signInWithGoogle = async () => {
  try {
    document.getElementById('loginError').style.display='none';
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) {
    document.getElementById('loginError').style.display='block';
    console.error(e);
  }
};

window.signOut = async () => {
  if(unsubSnapshot) unsubSnapshot();
  await fbSignOut(auth);
};

onAuthStateChanged(auth, async user => {
  if(user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('loadingScreen').classList.add('show');
    document.getElementById('userAvatar').src = user.photoURL||'';
    document.getElementById('userName').textContent = user.displayName||user.email;
    await loadFromCloud();
    document.getElementById('loadingScreen').classList.remove('show');
    document.getElementById('app').classList.add('show');
    window.initApp();
  } else {
    currentUser = null;
    document.getElementById('app').classList.remove('show');
    document.getElementById('loadingScreen').classList.remove('show');
    document.getElementById('loginScreen').style.display='flex';
  }
});

// ── FIRESTORE ──
async function loadFromCloud() {
  if(!currentUser) return;
  try {
    setSyncState('syncing');
    const ref = doc(db, 'users', currentUser.uid);
    const snap = await getDoc(ref);
    if(snap.exists()) {
      window.S = snap.data().data || {};
    } else {
      window.S = {};
    }
    // normalise
    if(!window.S.events)  window.S.events={};
    if(!window.S.todos)   window.S.todos=[];
    if(!window.S.goals)   window.S.goals=[];
    if(!window.S.health)  window.S.health={};
    if(!window.S.stickers)window.S.stickers={};
    if(!window.S.fills)   window.S.fills={};
    setSyncState('ok');
  } catch(e) {
    console.error('Load error', e);
    window.S = {events:{},todos:[],goals:[],health:{},stickers:{},fills:{}};
    setSyncState('error');
  }
}

// debounced save — waits 1.5s after last change before writing
window.save = () => {
  setSyncState('syncing');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if(!currentUser) return;
    try {
      const ref = doc(db, 'users', currentUser.uid);
      await setDoc(ref, { data: window.S }, { merge: true });
      setSyncState('ok');
    } catch(e) {
      console.error('Save error', e);
      setSyncState('error');
    }
  }, 1500);
};

function setSyncState(state) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state==='syncing'?' syncing': state==='error'?' error':'');
  dot.title = state==='syncing'?'正在同步...': state==='error'?'同步失败':'已同步 ✓';
}

</script>

<script>
// ═══════════════════════════════════════
// APP LOGIC (runs after Firebase loads)
// ═══════════════════════════════════════
window.S = {};
let calDate = new Date();
let selDay = null;
let selEvCol = '#f4a8a0';
let dragUrl = null;
let actTab = 'events';
let actCat = 'all';

const STKS = Array.from({length:18},(_,i)=>`https://s3.getstickerpack.com/storage/uploads/sticker-pack/bubu-dudu-1/sticker_${i+1}.webp`);
const ECOLS = ['#f4a8a0','#8ec48a','#b4a8d8','#e8c870','#88c4d8','#f4c8a0'];
const FILL_COLORS = [
  {c:'#ffe4e4',lbl:'💗 开心'},{c:'#ffe8b0',lbl:'😊 平静'},
  {c:'#e4f8e4',lbl:'🌿 充实'},{c:'#dce8ff',lbl:'💙 放松'},
  {c:'#ede4f8',lbl:'💜 感性'},{c:'#ffd8c0',lbl:'🧡 活力'},
  {c:'#e8e8e8',lbl:'😶 一般'},{c:'#c8d8f0',lbl:'🌧️ 低落'},
];
const TCATS = [
  {id:'all',lbl:'全部',c:'#d97068',bg:'#fde8e6'},
  {id:'work',lbl:'工作',c:'#5a9456',bg:'#e4f2e2'},
  {id:'life',lbl:'生活',c:'#7060a8',bg:'#eceaf8'},
  {id:'health',lbl:'健康',c:'#3a8060',bg:'#d0f0e4'},
  {id:'learn',lbl:'学习',c:'#9a7420',bg:'#fdf0d0'},
];
const MOODS = ['😄','😊','😐','😔','😢','😤','🤒','😴'];
const EXLIST = ['🚶 走路','🏃 跑步','🚴 骑行','🧘 瑜伽','🏊 游泳','💪 健身','🤸 拉伸'];
const MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

function todayStr(){const d=new Date();return fmt(d.getFullYear(),d.getMonth(),d.getDate());}
function fmt(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function hk(day){return 'h_'+(day||todayStr());}

function updateTopDate(){
  const d=new Date();const ds=['日','一','二','三','四','五','六'];
  document.getElementById('topDate').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 周${ds[d.getDay()]}`;
}

function switchTab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.atab').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  btn.classList.add('on');
  actTab=name;
  if(name==='todo'){renderTodoCats();renderTodoList();}
  if(name==='health')renderHealth();
  if(name==='goals')renderGoals();
  if(name==='design'){renderFillPicker();renderPlacedStickers();}
}

// ── CALENDAR ──
function renderCalendar(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('mmonth').textContent=`${y}年 ${MONTHS[m]}`;
  const gs=document.getElementById('goalStrip');gs.innerHTML='';
  S.goals.forEach(g=>{
    const pct=Math.min(100,Math.round((g.current/g.target)*100));
    const chip=document.createElement('div');chip.className='g-chip';
    chip.innerHTML=`${g.emoji||'🎯'} <b>${g.name}</b> <span class="g-chip-bar"><span class="g-chip-fill" style="width:${pct}%"></span></span> <b>${pct}%</b>`;
    gs.appendChild(chip);
  });
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  const first=new Date(y,m,1).getDay();
  const dcount=new Date(y,m+1,0).getDate();
  const today=new Date();
  for(let i=0;i<first;i++){const c=document.createElement('div');c.className='cell empty';grid.appendChild(c);}
  for(let d=1;d<=dcount;d++){
    const key=fmt(y,m,d);
    const cell=document.createElement('div');cell.className='cell';
    if(today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d)cell.classList.add('today');
    if(selDay===key)cell.classList.add('selected');
    if(S.fills[key]){const fill=document.createElement('div');fill.className='cell-mood-fill';fill.style.background=S.fills[key];cell.appendChild(fill);}
    const dnum=document.createElement('div');dnum.className='dnum';
    const nn=document.createElement('span');nn.className='dnum-n';nn.textContent=d;dnum.appendChild(nn);
    const sts=S.stickers[key]||[];
    if(sts.length>0){const sdiv=document.createElement('div');sdiv.className='dnum-stickers';sts.slice(0,2).forEach((url,si)=>{const img=document.createElement('img');img.className='ds';img.src=url;img.onerror=()=>img.style.display='none';img.onclick=(e)=>{e.stopPropagation();S.stickers[key].splice(si,1);save();renderCalendar();if(selDay===key)renderPlacedStickers();};sdiv.appendChild(img);});dnum.appendChild(sdiv);}
    cell.appendChild(dnum);
    const body=document.createElement('div');body.className='cell-body';
    const evts=S.events[key]||[];
    const dtd=S.todos.filter(t=>t.date===key&&!t.done);
    const hd=S.health[hk(key)]||{};
    let shown=0;
    evts.forEach(e=>{if(shown>=4)return;const t=document.createElement('span');t.className='ctag ev';t.style.borderLeftColor=e.color||'var(--pink-d)';t.textContent=(e.time?e.time.slice(0,5)+' ':'')+e.text;body.appendChild(t);shown++;});
    dtd.forEach(t=>{if(shown>=4)return;const s=document.createElement('span');s.className='ctag td';s.textContent='• '+t.text;body.appendChild(s);shown++;});
    if(hd.mood&&shown<5){const s=document.createElement('span');s.className='ctag hl';s.textContent=hd.mood+(hd.water?` 💧${hd.water}`:'');body.appendChild(s);shown++;}
    const total=evts.length+dtd.length+(hd.mood?1:0);
    if(total>shown){const s=document.createElement('span');s.className='ctag more';s.textContent=`+${total-shown}`;body.appendChild(s);}
    cell.appendChild(body);
    cell.addEventListener('dragover',e=>{e.preventDefault();cell.style.outline='2px dashed var(--pink-d)';});
    cell.addEventListener('dragleave',()=>cell.style.outline='');
    cell.addEventListener('drop',e=>{e.preventDefault();cell.style.outline='';if(dragUrl){if(!S.stickers[key])S.stickers[key]=[];S.stickers[key].push(dragUrl);save();renderCalendar();if(selDay===key)renderPlacedStickers();}});
    cell.addEventListener('click',()=>selectDay(y,m,d));
    grid.appendChild(cell);
  }
}

function selectDay(y,m,d){
  selDay=fmt(y,m,d);renderCalendar();
  const ds=['日','一','二','三','四','五','六'];
  const dd=new Date(y,m,d);
  document.getElementById('actDate').textContent=`${y}年 ${MONTHS[m]} ${d}日`;
  document.getElementById('actSub').textContent=`星期${ds[dd.getDay()]}`;
  if(actTab==='events')renderEvList();
  if(actTab==='todo'){renderTodoCats();renderTodoList();}
  if(actTab==='health')renderHealth();
  if(actTab==='design'){renderFillPicker();renderPlacedStickers();}
}

function chMonth(d){calDate.setMonth(calDate.getMonth()+d);renderCalendar();}

// ── EVENTS ──
function renderEvDots(){
  const el=document.getElementById('evDots');el.innerHTML='';
  ECOLS.forEach(c=>{const d=document.createElement('div');d.className='dot'+(c===selEvCol?' sel':'');d.style.background=c;d.onclick=()=>{selEvCol=c;renderEvDots();};el.appendChild(d);});
}
function renderEvList(){
  const key=selDay||todayStr();const el=document.getElementById('evList');el.innerHTML='';
  const evts=S.events[key]||[];
  if(!evts.length){el.innerHTML='<div style="font-size:.86rem;font-weight:600;color:var(--ink3);padding:6px 0;">还没有活动，添加一个吧 📌</div>';return;}
  evts.forEach((e,i)=>{const row=document.createElement('div');row.className='item-row ev-bg';row.innerHTML=`<div class="ir-dot" style="background:${e.color||'var(--pink)'}"></div><div class="ir-txt">${e.text}</div>${e.time?`<div class="ir-time">${e.time}</div>`:''}<button class="ir-del" onclick="delEv('${key}',${i})">✕</button>`;el.appendChild(row);});
}
function addEv(){
  const text=document.getElementById('evInp').value.trim();if(!text)return;
  const time=document.getElementById('evTime').value;const key=selDay||todayStr();
  if(!S.events[key])S.events[key]=[];
  S.events[key].push({text,time,color:selEvCol});
  save();document.getElementById('evInp').value='';document.getElementById('evTime').value='';
  renderEvList();renderCalendar();
}
function delEv(key,i){S.events[key].splice(i,1);save();renderEvList();renderCalendar();}

// ── TODO ──
function renderTodoCats(){
  const el=document.getElementById('todoCats');el.innerHTML='';
  TCATS.forEach(c=>{const b=document.createElement('button');b.className='ccat';b.style.borderColor=c.bg;b.style.color=c.id===actCat?'#fff':c.c;if(c.id===actCat)b.style.background=c.c;b.textContent=c.lbl;b.onclick=()=>{actCat=c.id;renderTodoCats();renderTodoList();};el.appendChild(b);});
}
function renderTodoList(){
  const el=document.getElementById('todoList');el.innerHTML='';
  let items=S.todos.filter(t=>actCat==='all'||t.cat===actCat);
  items.sort((a,b)=>(b.starred?1:0)-(a.starred?1:0));
  if(!items.length){el.innerHTML='<div style="font-size:.86rem;font-weight:600;color:var(--ink3);text-align:center;padding:14px;">空空的 ~ 加一个待办吧 🐻</div>';return;}
  items.forEach(t=>{const cat=TCATS.find(c=>c.id===t.cat)||TCATS[1];const idx=S.todos.indexOf(t);const row=document.createElement('div');row.className='item-row td-bg';if(t.done)row.style.opacity='.45';row.innerHTML=`<div class="chk ${t.done?'on':''}" onclick="togTodo(${idx})"></div><div class="ir-txt ${t.done?'done-txt':''}">${t.text}</div>${t.date?`<div class="ir-time">📅 ${t.date.slice(5)}</div>`:''}<div style="font-size:.65rem;font-weight:800;padding:2px 7px;border-radius:7px;background:${cat.bg};color:${cat.c};">${cat.lbl}</div><button class="ir-del" onclick="togStar(${idx})">${t.starred?'⭐':'☆'}</button><button class="ir-del" onclick="delTodo(${idx})">✕</button>`;el.appendChild(row);});
}
function addTodo(){
  const text=document.getElementById('todoInp').value.trim();if(!text)return;
  const date=document.getElementById('todoDate').value||'';const cat=actCat==='all'?'life':actCat;
  S.todos.push({text,cat,date,done:false,starred:false});
  save();document.getElementById('todoInp').value='';renderTodoList();renderCalendar();
}
function togTodo(i){S.todos[i].done=!S.todos[i].done;save();renderTodoList();renderCalendar();}
function togStar(i){S.todos[i].starred=!S.todos[i].starred;save();renderTodoList();}
function delTodo(i){S.todos.splice(i,1);save();renderTodoList();renderCalendar();}

// ── HEALTH ──
function renderHealth(){
  const day=selDay||todayStr();const k=hk(day);
  if(!S.health[k])S.health[k]={water:0,mood:null,sleep:{},meals:{},exercise:[],note:''};
  const h=S.health[k];
  const mr=document.getElementById('moodRow');mr.innerHTML='';
  MOODS.forEach(m=>{const b=document.createElement('span');b.className='mbtn'+(h.mood===m?' sel':'');b.textContent=m;b.onclick=()=>{h.mood=m;save();renderHealth();renderCalendar();};mr.appendChild(b);});
  document.getElementById('moodLbl').textContent=h.mood?`今日心情: ${h.mood}`:'';
  document.getElementById('wNum').textContent=h.water||0;
  const wc=document.getElementById('wCups');wc.innerHTML='';
  for(let i=0;i<8;i++){const s=document.createElement('span');s.className='wcup'+(i<(h.water||0)?' on':'');s.textContent='🥤';s.onclick=()=>{h.water=i+1;save();renderHealth();renderCalendar();};wc.appendChild(s);}
  if(h.sleep?.bed)document.getElementById('slBed').value=h.sleep.bed;
  if(h.sleep?.wake)document.getElementById('slWake').value=h.sleep.wake;
  if(h.sleep?.hours)document.getElementById('slHrs').textContent=h.sleep.hours.toFixed(1);
  const ec=document.getElementById('exChips');ec.innerHTML='';
  EXLIST.forEach(ex=>{const c=document.createElement('div');c.className='echip'+((h.exercise?.includes(ex))?' on':'');c.textContent=ex;c.onclick=()=>{if(!h.exercise)h.exercise=[];const idx=h.exercise.indexOf(ex);idx>=0?h.exercise.splice(idx,1):h.exercise.push(ex);save();};ec.appendChild(c);});
  const mr2=document.getElementById('mealRows');mr2.innerHTML='';
  ['早餐','午餐','晚餐','零食'].forEach(meal=>{const r=document.createElement('div');r.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:8px;';r.innerHTML=`<div style="font-size:.82rem;font-weight:800;color:var(--ink2);min-width:38px;">${meal}</div><input class="inp sm" id="meal_${meal}" placeholder="吃了什么... 🍱" value="${(h.meals&&h.meals[meal])||''}"/>`;mr2.appendChild(r);});
  document.getElementById('hNote').value=h.note||'';
}
function addWater(){const k=hk(selDay||todayStr());if(!S.health[k])S.health[k]={water:0};S.health[k].water=Math.min(8,(S.health[k].water||0)+1);save();renderHealth();renderCalendar();}
function saveSleep(){const k=hk(selDay||todayStr());const bed=document.getElementById('slBed').value,wake=document.getElementById('slWake').value;if(!S.health[k])S.health[k]={};const bh=+bed.split(':')[0],bm=+bed.split(':')[1],wh=+wake.split(':')[0],wm=+wake.split(':')[1];let hrs=(wh*60+wm-(bh*60+bm))/60;if(hrs<0)hrs+=24;S.health[k].sleep={bed,wake,hours:hrs};save();renderHealth();}
function saveEx(){const k=hk(selDay||todayStr());const min=document.getElementById('exMin').value;if(!S.health[k])S.health[k]={};S.health[k].exerciseMin=min;save();flash('exFlash',`✓ ${min}min`);}
function saveMeals(){const k=hk(selDay||todayStr());if(!S.health[k])S.health[k]={meals:{}};if(!S.health[k].meals)S.health[k].meals={};['早餐','午餐','晚餐','零食'].forEach(m=>{const i=document.getElementById('meal_'+m);if(i)S.health[k].meals[m]=i.value;});save();flash('mealFlash','✓ 保存');}
function saveNote(){const k=hk(selDay||todayStr());if(!S.health[k])S.health[k]={};S.health[k].note=document.getElementById('hNote').value;save();flash('noteFlash','✓ 保存');}
function flash(id,msg){const e=document.getElementById(id);e.innerHTML=`<span class="flash">${msg}</span>`;setTimeout(()=>e.innerHTML='',2000);}

// ── GOALS ──
function renderGoals(){
  const el=document.getElementById('goalList');el.innerHTML='';
  if(!S.goals.length){el.innerHTML='<div class="sec" style="text-align:center;color:var(--ink3);font-weight:700;padding:20px;">还没有目标 ~ 创建一个吧 ⭐</div>';return;}
  S.goals.forEach((g,i)=>{const pct=Math.min(100,Math.round((g.current/g.target)*100));const sec=document.createElement('div');sec.className='sec';sec.innerHTML=`<div class="g-card" style="background:transparent;padding:0;"><div class="g-row"><div class="g-emoji">${g.emoji||'🎯'}</div><div class="g-name">${g.name}</div><div class="g-pct">${pct}%</div><button class="ir-del" onclick="delGoal(${i})">✕</button></div><div class="g-bar"><div class="g-fill" style="width:${pct}%"></div></div><div class="g-meta"><span>${g.current} / ${g.target} ${g.unit||''}</span><span>${pct>=100?'🎉 完成!':'还差 '+(g.target-g.current)+' '+(g.unit||'')}</span></div><div class="g-btns"><button class="gbtn" onclick="upG(${i},-1)">−</button><button class="gbtn" onclick="upG(${i},1)">+1</button><button class="gbtn" onclick="upG(${i},5)">+5</button><button class="gbtn" onclick="setG(${i})">✏️ 设置</button></div></div>`;el.appendChild(sec);});
  renderCalendar();
}
function addGoal(){const name=document.getElementById('gName').value.trim();if(!name)return;const emoji=document.getElementById('gEmoji').value.trim()||'🎯';const target=+document.getElementById('gTarget').value||10;const unit=document.getElementById('gUnit').value.trim();S.goals.push({name,emoji,target,unit,current:0});save();['gName','gEmoji','gUnit'].forEach(id=>document.getElementById(id).value='');renderGoals();}
function upG(i,d){S.goals[i].current=Math.max(0,S.goals[i].current+d);save();renderGoals();}
function setG(i){const v=prompt(`"${S.goals[i].name}" 当前进度:`);if(v!==null&&!isNaN(+v)){S.goals[i].current=+v;save();renderGoals();}}
function delGoal(i){S.goals.splice(i,1);save();renderGoals();}

// ── DESIGN ──
function renderFillPicker(){
  const key=selDay||todayStr();const el=document.getElementById('fillPicker');el.innerHTML='';
  FILL_COLORS.forEach(f=>{const b=document.createElement('div');b.className='mf-btn'+(S.fills[key]===f.c?' sel':'');b.style.background=f.c;b.title=f.lbl;b.onclick=()=>{if(S.fills[key]===f.c){delete S.fills[key];}else{S.fills[key]=f.c;}save();renderCalendar();renderFillPicker();};el.appendChild(b);});
  const clr=document.createElement('button');clr.className='mf-clear';clr.textContent='清除颜色';clr.onclick=()=>{delete S.fills[key];save();renderCalendar();renderFillPicker();};el.appendChild(clr);
}
function buildStickerRail(){
  const rail=document.getElementById('stkRail');
  STKS.forEach(url=>{
    const img=document.createElement('img');img.src=url;img.className='stk-thumb';img.draggable=true;img.onerror=()=>img.style.display='none';
    img.addEventListener('dragstart',e=>{dragUrl=url;document.getElementById('dragGhost').src=url;document.getElementById('dragGhost').style.display='block';e.dataTransfer.setDragImage(new Image(),0,0);});
    img.addEventListener('dragend',()=>{document.getElementById('dragGhost').style.display='none';dragUrl=null;});
    img.onclick=()=>{const key=selDay||todayStr();if(!S.stickers[key])S.stickers[key]=[];S.stickers[key].push(url);save();renderCalendar();renderPlacedStickers();};
    rail.appendChild(img);
  });
}
document.addEventListener('dragover',e=>{e.preventDefault();const g=document.getElementById('dragGhost');g.style.left=e.clientX+'px';g.style.top=e.clientY+'px';});
function renderPlacedStickers(){
  const key=selDay||todayStr();const el=document.getElementById('placedStickers');el.innerHTML='';
  const sts=S.stickers[key]||[];
  if(!sts.length){el.innerHTML='<div style="font-size:.8rem;color:var(--ink3);font-weight:600;">还没有贴纸</div>';return;}
  sts.forEach((url,i)=>{const img=document.createElement('img');img.src=url;img.className='placed-stk';img.onerror=()=>img.style.display='none';img.title='点击删除';img.onclick=()=>{S.stickers[key].splice(i,1);save();renderCalendar();renderPlacedStickers();};el.appendChild(img);});
}

// ── INIT (called after Firebase loads data) ──
window.initApp = function(){
  updateTopDate();
  renderEvDots();
  buildStickerRail();
  const d=new Date();
  selectDay(d.getFullYear(),d.getMonth(),d.getDate());
  document.getElementById('todoDate').value=todayStr();
  setInterval(updateTopDate,60000);
};
</script>
