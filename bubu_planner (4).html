<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>一二布布 日历</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fef8f3;
  --white:#fff;
  --pink:#f4a8a0;
  --pink-d:#d97068;
  --pink-s:#fde8e6;
  --green:#8ec48a;
  --green-d:#5a9456;
  --green-s:#e4f2e2;
  --lav-s:#eceaf8;
  --yel:#e8c870;
  --yel-s:#fdf4d8;
  --ink:#2e2016;
  --ink2:#6b4c3c;
  --ink3:#a88070;
  --line:#f0ddd8;
  --r:14px;
  --sh:0 2px 16px rgba(46,32,22,.09);
  --sh2:0 8px 32px rgba(46,32,22,.16);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Nunito','Noto Sans SC',sans-serif;overflow:hidden;}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fde8e6,#fef8f3 50%,#e4f2e2);}
.login-box{background:var(--white);border-radius:24px;padding:36px 28px;box-shadow:var(--sh2);text-align:center;max-width:340px;width:90%;}
.login-stickers{display:flex;justify-content:center;gap:8px;margin-bottom:16px;}
.login-stickers img{width:56px;height:56px;object-fit:contain;border-radius:50%;animation:bobble 2.5s ease-in-out infinite;}
.login-stickers img:nth-child(2){animation-delay:.5s;}
.login-stickers img:nth-child(3){animation-delay:1s;}
@keyframes bobble{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.login-title{font-size:1.5rem;font-weight:900;color:var(--pink-d);margin-bottom:6px;}
.login-sub{font-size:.88rem;font-weight:600;color:var(--ink2);margin-bottom:24px;line-height:1.6;}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 20px;border-radius:12px;background:var(--white);border:2px solid var(--line);font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:800;color:var(--ink);cursor:pointer;transition:all .2s;}
.google-btn:hover,.google-btn:active{background:var(--pink-s);border-color:var(--pink);}
.google-btn img{width:22px;height:22px;}
.login-note{font-size:.72rem;color:var(--ink3);font-weight:600;margin-top:14px;line-height:1.6;}
#loginError{color:var(--pink-d);font-size:.8rem;font-weight:700;margin-top:10px;display:none;}

/* ── LOADING ── */
#loadingScreen{position:fixed;inset:0;z-index:999;display:none;align-items:center;justify-content:center;background:var(--bg);flex-direction:column;gap:14px;}
#loadingScreen.show{display:flex;}
.loader{width:40px;height:40px;border:4px solid var(--pink-s);border-top-color:var(--pink-d);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-size:.88rem;font-weight:700;color:var(--ink2);}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100vh;height:100dvh;}
#app.show{display:flex;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--white);border-bottom:2px solid var(--line);flex-shrink:0;z-index:50;}
.hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px;}
.hamburger span{display:block;width:22px;height:2.5px;background:var(--ink2);border-radius:2px;transition:all .25s;}
.logo-txt{font-size:1rem;font-weight:900;color:var(--pink-d);}
.logo-imgs{display:flex;gap:2px;}
.logo-imgs img{width:28px;height:28px;border-radius:50%;object-fit:contain;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green-d);flex-shrink:0;}
.sync-dot.syncing{background:var(--yel);animation:pulse .8s ease-in-out infinite;}
.sync-dot.error{background:var(--pink-d);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.user-av{width:28px;height:28px;border-radius:50%;border:2px solid var(--pink);object-fit:cover;}
.today-pill{background:var(--pink-s);color:var(--pink-d);font-size:.72rem;font-weight:800;padding:4px 10px;border-radius:14px;}

/* ── SIDE DRAWER ── */
.drawer-overlay{position:fixed;inset:0;z-index:200;background:rgba(46,32,22,.35);display:none;backdrop-filter:blur(2px);}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;top:0;left:-280px;bottom:0;width:280px;z-index:201;background:var(--white);box-shadow:var(--sh2);transition:left .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.drawer.open{left:0;}
.drawer-head{padding:20px 20px 16px;border-bottom:2px solid var(--line);display:flex;align-items:center;gap:10px;}
.drawer-head img{width:36px;height:36px;border-radius:50%;border:2px solid var(--pink);object-fit:cover;}
.drawer-user{flex:1;}
.drawer-name{font-size:.9rem;font-weight:800;color:var(--ink);}
.drawer-email{font-size:.7rem;color:var(--ink3);font-weight:600;}
.drawer-nav{flex:1;padding:12px 0;}
.dnav-item{display:flex;align-items:center;gap:12px;padding:13px 20px;font-size:.92rem;font-weight:800;color:var(--ink2);cursor:pointer;transition:all .15s;border-left:3px solid transparent;}
.dnav-item:hover,.dnav-item.on{background:var(--pink-s);color:var(--pink-d);border-left-color:var(--pink-d);}
.dnav-item .di{font-size:1.2rem;width:24px;text-align:center;}
.drawer-foot{padding:16px 20px;border-top:2px solid var(--line);}
.signout-btn{width:100%;padding:10px;background:var(--pink-s);color:var(--pink-d);border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:.84rem;font-weight:800;cursor:pointer;}

/* ── VIEWS ── */
.view{display:none;flex:1;overflow:hidden;flex-direction:column;}
.view.on{display:flex;}

/* ── CALENDAR VIEW ── */
.cal-view-inner{display:flex;flex-direction:column;flex:1;overflow:hidden;}

/* desktop: side by side */
@media(min-width:768px){
  .cal-view-inner{flex-direction:row;}
  .cal-col{width:58%;border-right:2px solid var(--line);}
  .day-panel{width:42%;display:flex!important;position:static!important;transform:none!important;border-radius:0!important;box-shadow:none!important;max-height:none!important;}
  .day-panel-inner{border-radius:0!important;}
  .dp-handle{display:none!important;}
  .cal-grid-scroll{flex:1;}
}

/* CALENDAR COL */
.cal-col{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;flex-shrink:0;}
.cal-nav-grp{display:flex;align-items:center;gap:8px;}
.mnav{background:var(--pink-s);border:none;border-radius:50%;width:32px;height:32px;font-size:1rem;cursor:pointer;color:var(--pink-d);font-weight:800;transition:all .18s;}
.mnav:hover,.mnav:active{background:var(--pink-d);color:#fff;}
.mmonth{font-size:1.1rem;font-weight:900;color:var(--ink);min-width:110px;text-align:center;}
.goal-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:0 14px 8px;flex-shrink:0;}
.goal-strip::-webkit-scrollbar{display:none;}
.g-chip{display:flex;align-items:center;gap:5px;background:var(--white);border:2px solid var(--green);border-radius:20px;padding:4px 10px;white-space:nowrap;font-size:.72rem;font-weight:700;color:var(--ink2);flex-shrink:0;}
.g-chip-bar{width:36px;height:4px;background:var(--green-s);border-radius:4px;display:inline-block;overflow:hidden;vertical-align:middle;}
.g-chip-fill{height:100%;background:var(--green-d);border-radius:4px;}
.cal-days-head{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 10px;flex-shrink:0;}
.dh{text-align:center;font-size:.74rem;font-weight:800;color:var(--ink3);padding:3px 0;}
.cal-grid-scroll{flex:1;overflow:hidden;padding:3px 10px 10px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;height:100%;}

/* CELL */
.cell{border-radius:8px;background:var(--white);border:2px solid transparent;cursor:pointer;transition:border-color .15s;display:flex;flex-direction:column;padding:4px 5px 3px;position:relative;overflow:hidden;min-height:0;}
.cell:active{transform:scale(.97);}
.cell.today{border-color:var(--pink-d);box-shadow:0 0 0 2px var(--pink-s);}
.cell.selected{border-color:var(--pink-d);background:var(--pink-s);}
.cell.empty{background:transparent;border-color:transparent;cursor:default;}
.cell-mood-fill{position:absolute;inset:0;opacity:.25;border-radius:6px;pointer-events:none;z-index:0;}
.dnum{font-size:.8rem;font-weight:900;line-height:1.2;flex-shrink:0;position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;}
.dnum-n{color:var(--ink);}
.cell.today .dnum-n{color:var(--pink-d);}
.dnum-stickers{display:flex;gap:1px;}
.ds{width:14px;height:14px;object-fit:contain;}
.cell-body{display:flex;flex-direction:column;gap:1.5px;flex:1;overflow:hidden;position:relative;z-index:1;margin-top:2px;}
.ctag{font-size:.54rem;font-weight:800;line-height:1.4;border-radius:3px;padding:1px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.ctag.ev{background:rgba(244,168,160,.25);color:#c04840;border-left:2px solid var(--pink-d);}
.ctag.td{background:rgba(142,196,138,.25);color:#3a7436;border-left:2px solid var(--green-d);}
.ctag.hl{background:rgba(232,200,112,.3);color:#8a6010;border-left:2px solid var(--yel);}
.ctag.more{color:var(--ink3);font-size:.5rem;padding:0 3px;background:none;border:none;}

/* ── DAY PANEL (slide up on mobile) ── */
.day-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  max-height:82vh;
  display:flex;flex-direction:column;
}
.day-panel.open{transform:translateY(0);}
.day-panel-inner{
  background:var(--white);
  border-radius:20px 20px 0 0;
  box-shadow:0 -4px 32px rgba(46,32,22,.15);
  display:flex;flex-direction:column;
  max-height:82vh;
  overflow:hidden;
}
.dp-handle{width:40px;height:4px;background:var(--line);border-radius:2px;margin:10px auto 0;}
.dp-head{padding:10px 18px 8px;border-bottom:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.dp-date{font-size:1.05rem;font-weight:900;color:var(--ink);}
.dp-close{background:var(--pink-s);border:none;border-radius:50%;width:30px;height:30px;font-size:1rem;cursor:pointer;color:var(--pink-d);font-weight:800;}
.dp-tabs{display:flex;gap:3px;padding:8px 14px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.dp-tabs::-webkit-scrollbar{display:none;}
.dptab{padding:6px 13px;border-radius:18px;border:none;font-family:'Nunito',sans-serif;font-size:.76rem;font-weight:800;cursor:pointer;transition:all .18s;background:transparent;color:var(--ink2);white-space:nowrap;}
.dptab.on{background:var(--pink-d);color:#fff;}
.dp-body{flex:1;overflow-y:auto;padding:12px 16px 24px;-webkit-overflow-scrolling:touch;}
.dp-body::-webkit-scrollbar{display:none;}
.dp-panel{display:none;flex-direction:column;gap:12px;}
.dp-panel.on{display:flex;}

/* ── OTHER VIEWS (todo, goals, health) ── */
.scroll-view{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;}
.scroll-view::-webkit-scrollbar{display:none;}
.view-title{font-size:1.1rem;font-weight:900;color:var(--ink);display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.view-title img{width:34px;height:34px;object-fit:contain;border-radius:50%;}

/* ── SHARED COMPONENTS ── */
.sec{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:12px;}
.sec-title{font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px;}
.item-row{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:10px;margin-bottom:5px;font-weight:700;color:var(--ink);}
.item-row.ev-bg{background:var(--pink-s);}
.item-row.td-bg{background:var(--green-s);}
.item-row.hl-bg{background:var(--yel-s);}
.ir-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ir-txt{flex:1;font-size:.86rem;line-height:1.35;}
.ir-time{font-size:.7rem;color:var(--ink3);font-weight:700;white-space:nowrap;}
.ir-del{background:none;border:none;cursor:pointer;color:var(--ink3);font-size:.88rem;padding:0 3px;min-width:24px;text-align:center;}
.ir-del:hover{color:var(--pink-d);}
.chk{width:20px;height:20px;border-radius:50%;border:2.5px solid var(--green);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;background:#fff;}
.chk.on{background:var(--green-d);border-color:var(--green-d);}
.chk.on::after{content:'✓';color:#fff;font-size:.62rem;font-weight:900;}
.done-txt{text-decoration:line-through;opacity:.45;}
.add-row{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.inp{flex:1;min-width:100px;border:2px solid var(--line);border-radius:10px;padding:9px 12px;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:600;outline:none;color:var(--ink);background:var(--bg);transition:border .18s;-webkit-appearance:none;}
.inp:focus{border-color:var(--pink-d);background:var(--white);}
.inp.sm{font-size:.8rem;padding:7px 10px;}
input[type=time].inp{width:100px;flex:none;font-size:.8rem;}
input[type=date].inp{flex:none;font-size:.8rem;}
.btn{background:var(--pink-d);color:#fff;border:none;border-radius:10px;padding:9px 16px;font-family:'Nunito',sans-serif;font-size:.84rem;font-weight:800;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn:active{opacity:.82;}
.btn.g{background:var(--green-d);}
.btn.sm{padding:8px 14px;font-size:.8rem;}
.dots{display:flex;gap:5px;align-items:center;}
.dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s;}
.dot.sel{border-color:var(--ink);}
.cats{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.ccat{border:2px solid;border-radius:18px;padding:5px 12px;font-family:'Nunito',sans-serif;font-size:.74rem;font-weight:800;cursor:pointer;background:#fff;}
.mood-fill-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.mf-btn{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .18s;position:relative;}
.mf-btn.sel::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:900;color:rgba(0,0,0,.5);}
.mf-clear{font-size:.72rem;font-weight:700;color:var(--ink3);cursor:pointer;padding:4px 8px;border-radius:8px;border:1.5px solid var(--line);background:var(--white);}
.h-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.wcup{font-size:1.3rem;cursor:pointer;filter:grayscale(.7) opacity(.35);transition:all .15s;}
.wcup.on{filter:none;transform:scale(1.1);}
.bnum{font-size:1.8rem;font-weight:900;color:var(--pink-d);line-height:1;}
.bsub{font-size:.68rem;color:var(--ink3);font-weight:700;}
.echip{border:2px solid var(--green);border-radius:16px;padding:5px 11px;font-size:.74rem;font-weight:800;cursor:pointer;background:#fff;color:var(--green-d);transition:all .15s;margin-bottom:5px;display:inline-block;}
.echip.on{background:var(--green-d);color:#fff;border-color:var(--green-d);}
.mbtn{font-size:1.4rem;cursor:pointer;filter:grayscale(.5) opacity(.5);transition:all .18s;border-radius:8px;padding:2px;}
.mbtn.sel{filter:none;background:var(--pink-s);}
.note-ta{width:100%;border:2px solid var(--line);border-radius:10px;padding:9px 12px;font-family:'Nunito','Noto Sans SC',sans-serif;font-size:.86rem;font-weight:600;resize:vertical;min-height:72px;outline:none;color:var(--ink);background:var(--bg);line-height:1.6;-webkit-appearance:none;}
.note-ta:focus{border-color:var(--pink-d);background:var(--white);}
.sl-row{display:flex;gap:8px;align-items:center;margin:5px 0;font-size:.82rem;font-weight:700;color:var(--ink2);}
.sl-row input[type=time]{border:2px solid var(--line);border-radius:9px;padding:7px 9px;font-family:'Nunito',sans-serif;font-size:.8rem;outline:none;color:var(--ink);background:var(--bg);-webkit-appearance:none;}
.g-card{background:var(--bg);border-radius:12px;padding:12px;margin-bottom:10px;}
.g-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.g-emoji{font-size:1.2rem;}
.g-name{flex:1;font-size:.9rem;font-weight:800;}
.g-pct{font-size:.76rem;font-weight:800;color:var(--pink-d);}
.g-bar{height:7px;border-radius:7px;background:var(--pink-s);overflow:hidden;margin-bottom:4px;}
.g-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--pink),var(--pink-d));transition:width .5s;}
.g-meta{display:flex;justify-content:space-between;font-size:.7rem;color:var(--ink3);font-weight:700;}
.g-btns{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
.gbtn{border:2px solid var(--line);border-radius:8px;background:#fff;padding:5px 10px;font-family:'Nunito',sans-serif;font-size:.74rem;font-weight:800;color:var(--ink2);cursor:pointer;}
.gbtn:active{background:var(--pink-d);color:#fff;border-color:var(--pink-d);}
.stk-rail{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0;}
.stk-thumb{width:44px;height:44px;object-fit:contain;cursor:pointer;border-radius:10px;border:2px solid transparent;transition:all .18s;}
.stk-thumb:active{border-color:var(--pink);background:var(--pink-s);transform:scale(1.12);}
.placed-stk{width:42px;height:42px;object-fit:contain;border-radius:8px;cursor:pointer;border:2px solid var(--line);}
.flash{display:inline-block;background:var(--green-s);color:var(--green-d);border-radius:8px;padding:3px 9px;font-size:.7rem;font-weight:800;margin-left:6px;}
.empty-state{font-size:.84rem;font-weight:600;color:var(--ink3);text-align:center;padding:14px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-stickers">
      <img src="https://s3.getstickerpack.com/storage/uploads/sticker-pack/bubu-dudu-1/sticker_2.webp" onerror="this.style.display='none'" alt=""/>
      <img src="https://s3.getstickerpack.com/storage/uploads/sticker-pack/bubu-dudu-1/sticker_3.webp" onerror="this.style.display='none'" alt=""/>
      <img src="https://s3.getstickerpack.com/storage/uploads/sticker-pack/bubu-dudu-1/sticker_6.webp" onerror="this.style.display='none'" alt=""/>
    </div>
    <div class="login-title">一二布布 日历</div>
    <div class="login-sub">你的专属小日记 🌸<br/>登录后数据自动保存到云端</div>
    <button class="google-btn" onclick="signInWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt=""/>
      用 Google 账号登录
    </button>
    <div id="loginError">登录失败，请重试 😢</div>
    <div class="login-note">数据只属于你，其他人看不到 🔒</div>
  </div>
</div>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="loader"></div>
  <div class="load-txt">加载中... 🐻</div>
</div>

<!-- APP -->
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <button class="hamburger" onclick="toggleDrawer()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="logo-imgs">
      <img src="https://s3.getstickerpack.com/storage/uploads/sticker-pack/bubu-dudu-1/sticker_2.webp" onerror="this.style.display='none'" alt=""/>
      <img src="https://s3.getstickerpack.com/storage/uploads/sticker-pack/bubu-dudu-1/sticker_3.webp" onerror="this.style.display='none'" alt=""/>
    </div>
    <span class="logo-txt">一二布布</span>
    <div class="topbar-right">
      <div class="sync-dot" id="syncDot"></div>
      <div id="topMood" style="font-size:1.2rem;line-height:1;display:none;"></div>

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1semI56vcPLySHbgquOh-STq0ukcx0ns",
  authDomain: "calendar-yb-a0d91.firebaseapp.com",
  projectId: "calendar-yb-a0d91",
  storageBucket: "calendar-yb-a0d91.firebasestorage.app",
  messagingSenderId: "297361963615",
  appId: "1:297361963615:web:ba9fb20af8849f95c539ea"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
let currentUser = null;
let saveTimer = null;

window.signInWithGoogle = async () => {
  try {
    document.getElementById('loginError').style.display='none';
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) {
    document.getElementById('loginError').style.display='block';
    console.error(e);
  }
};

window.doSignOut = async () => {
  await fbSignOut(auth);
  closeDrawer();
};

onAuthStateChanged(auth, async user => {
  if(user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('loadingScreen').classList.add('show');
    // set user info
    document.getElementById('userAv').src = user.photoURL||'';
    document.getElementById('drawerAv').src = user.photoURL||'';
    document.getElementById('drawerName').textContent = user.displayName||'';
    document.getElementById('drawerEmail').textContent = user.email||'';
    // load data
    try {
      setSyncState('syncing');
      const ref = doc(db,'users',user.uid);
      const snap = await getDoc(ref);
      window.S = snap.exists() ? (snap.data().data||{}) : {};
    } catch(e) { window.S={}; setSyncState('error'); }
    if(!window.S.events)  window.S.events={};
    if(!window.S.todos)   window.S.todos=[];
    if(!window.S.goals)   window.S.goals=[];
    if(!window.S.health)  window.S.health={};
    if(!window.S.stickers)window.S.stickers={};
    if(!window.S.fills)   window.S.fills={};
    setSyncState('ok');
    document.getElementById('loadingScreen').classList.remove('show');
    document.getElementById('app').classList.add('show');
    window.initApp();
  } else {
    currentUser=null;
    document.getElementById('app').classList.remove('show');
    document.getElementById('loadingScreen').classList.remove('show');
    document.getElementById('loginScreen').style.display='flex';
  }
});

window.save = () => {
  setSyncState('syncing');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    if(!currentUser) return;
    try {
      await setDoc(doc(db,'users',currentUser.uid),{data:window.S},{merge:true});
      setSyncState('ok');
    } catch(e) { setSyncState('error'); }
  }, 1500);
};

function setSyncState(s) {
  const d=document.getElementById('syncDot');
  d.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
}

<script>
window.S={};
let calDate=new Date();
let selDay=null;
let selEvCol='#f4a8a0';

const STKS=Array.from({length:18},(_,i)=>`https://s3.getstickerpack.com/storage/uploads/sticker-pack/bubu-dudu-1/sticker_${i+1}.webp`);
const ECOLS=['#f4a8a0','#8ec48a','#b4a8d8','#e8c870','#88c4d8','#f4c8a0'];

  {c:'#ffe4e4',lbl:'💗 开心'},{c:'#ffe8b0',lbl:'😊 平静'},

  {c:'#e8e8e8',lbl:'😶 一般'},{c:'#c8d8f0',lbl:'🌧️ 低落'},
];
const TCATS=[
  {id:'all',lbl:'全部',c:'#d97068',bg:'#fde8e6'},
  {id:'work',lbl:'工作',c:'#5a9456',bg:'#e4f2e2'},
  {id:'life',lbl:'生活',c:'#7060a8',bg:'#eceaf8'},
  {id:'health',lbl:'健康',c:'#3a8060',bg:'#d0f0e4'},
  {id:'learn',lbl:'学习',c:'#9a7420',bg:'#fdf0d0'},
];
const MOODS=['😄','😊','😐','😔','😢','😤','🤒','😴'];
const EXLIST=['🚶走路','🏃跑步','🚴骑行','🧘瑜伽','🏊游泳','💪健身','🤸拉伸'];
const MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
const DNAMES=['日','一','二','三','四','五','六'];

function todayStr(){const d=new Date();return fmt(d.getFullYear(),d.getMonth(),d.getDate());}
function fmt(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function hk(day){return 'h_'+(day||todayStr());}
function flash(id,msg){const e=document.getElementById(id);if(!e)return;e.innerHTML=`<span class="flash">${msg}</span>`;setTimeout(()=>e.innerHTML='',2000);}

function updateTopDate(){
  const d=new Date();
  document.getElementById('topDate').textContent=`${d.getMonth()+1}/${d.getDate()}`;
}

function toggleDrawer(){
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('drawerOverlay').classList.toggle('open');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}
function navTo(name,el){
  document.querySelectorAll('.dnav-item').forEach(i=>i.classList.remove('on'));
  if(el) el.classList.add('on');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById('view-'+name).classList.add('on');
  currentView=name;
  closeDrawer();
  if(name==='todo'){
    actCat='all';
    renderTodoCats();
    renderTodoList();
    const td=document.getElementById('todoDate');
    if(td&&!td.value) td.value=todayStr();
  }
  if(name==='health'){renderHealth();const hl=document.getElementById('healthDayLabel');if(hl)hl.textContent='— 今天';}
  if(name==='goals')renderGoals();
}

function updateTopBar(){
  const k=hk(todayStr());
  const h=S.health&&S.health[k]?S.health[k]:{};
  // mood
  const moodEl=document.getElementById('topMood');
  if(moodEl){
    if(h.mood){moodEl.textContent=h.mood;moodEl.style.display='block';}

  const wEl=document.getElementById('topWater');
  const wNum=document.getElementById('topWaterNum');

    if(h.water&&h.water>0){wEl.style.display='flex';wNum.textContent=`${h.water}/8`;}

}

// ── CALENDAR ──
function renderCalendar(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('mmonth').textContent=`${y}年 ${MONTHS[m]}`;
  const gs=document.getElementById('goalStrip');gs.innerHTML='';
  S.goals.forEach(g=>{
    const pct=Math.min(100,Math.round((g.current/g.target)*100));
    const chip=document.createElement('div');chip.className='g-chip';
    chip.innerHTML=`${g.emoji||'🎯'} <b>${g.name}</b> <span class="g-chip-bar"><span class="g-chip-fill" style="width:${pct}%"></span></span> <b>${pct}%</b>`;
    gs.appendChild(chip);
  });
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  const first=new Date(y,m,1).getDay();
  const dcount=new Date(y,m+1,0).getDate();
  const today=new Date();
  for(let i=0;i<first;i++){const c=document.createElement('div');c.className='cell empty';grid.appendChild(c);}
  for(let d=1;d<=dcount;d++){
    const key=fmt(y,m,d);
    const cell=document.createElement('div');cell.className='cell';
    if(today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d)cell.classList.add('today');
    if(selDay===key)cell.classList.add('selected');
    if(S.fills[key]){const fill=document.createElement('div');fill.className='cell-mood-fill';fill.style.background=S.fills[key];cell.appendChild(fill);}
    const dnum=document.createElement('div');dnum.className='dnum';
    const nn=document.createElement('span');nn.className='dnum-n';nn.textContent=d;dnum.appendChild(nn);
    const sts=S.stickers[key]||[];
    if(sts.length){const sdiv=document.createElement('div');sdiv.className='dnum-stickers';sts.slice(0,2).forEach((url,si)=>{const img=document.createElement('img');img.className='ds';img.src=url;img.onerror=()=>img.style.display='none';img.onclick=e=>{e.stopPropagation();S.stickers[key].splice(si,1);save();renderCalendar();if(selDay===key)renderPlacedStickers();};sdiv.appendChild(img);});dnum.appendChild(sdiv);}
    cell.appendChild(dnum);
    const body=document.createElement('div');body.className='cell-body';
    const evts=S.events[key]||[];
    const dtd=S.todos.filter(t=>t.date===key&&!t.done);
    const hd=S.health[hk(key)]||{};
    let shown=0;
    evts.forEach(e=>{if(shown>=3)return;const t=document.createElement('span');t.className='ctag ev';t.style.borderLeftColor=e.color||'var(--pink-d)';t.textContent=(e.time?e.time.slice(0,5)+' ':'')+e.text;body.appendChild(t);shown++;});
    dtd.forEach(t=>{if(shown>=3)return;const s=document.createElement('span');s.className='ctag td';s.textContent='•'+t.text;body.appendChild(s);shown++;});
    if(hd.mood&&shown<4){const s=document.createElement('span');s.className='ctag hl';s.textContent=hd.mood+(hd.water?` 💧${hd.water}`:'');body.appendChild(s);shown++;}
    const total=evts.length+dtd.length+(hd.mood?1:0);
    if(total>shown){const s=document.createElement('span');s.className='ctag more';s.textContent=`+${total-shown}`;body.appendChild(s);}
    cell.appendChild(body);
    cell.addEventListener('click',()=>selectDay(y,m,d));
    grid.appendChild(cell);
  }
}

function selectDay(y,m,d){
  selDay=fmt(y,m,d);renderCalendar();
  const dd=new Date(y,m,d);
  document.getElementById('dpDate').textContent=`${y}年${MONTHS[m]}${d}日 周${DNAMES[dd.getDay()]}`;
  renderEvList();
  if(curDpTab==='todo')renderDpTodos();
  if(curDpTab==='health')renderDpHealth();
  if(curDpTab==='design'){renderFillPicker();renderPlacedStickers();}
  openDayPanel();
}

function chMonth(d){calDate.setMonth(calDate.getMonth()+d);renderCalendar();}

// ── EVENTS ──
function renderEvDots(){
  const el=document.getElementById('evDots');el.innerHTML='';
  ECOLS.forEach(c=>{const d=document.createElement('div');d.className='dot'+(c===selEvCol?' sel':'');d.style.background=c;d.onclick=()=>{selEvCol=c;renderEvDots();};el.appendChild(d);});
}
function renderEvList(){
  const key=selDay||todayStr();const el=document.getElementById('evList');el.innerHTML='';
  const evts=S.events[key]||[];
  if(!evts.length){el.innerHTML='<div class="empty-state">还没有活动 📌</div>';return;}
  evts.forEach((e,i)=>{const row=document.createElement('div');row.className='item-row ev-bg';row.innerHTML=`<div class="ir-dot" style="background:${e.color||'var(--pink)'}"></div><div class="ir-txt">${e.text}</div>${e.time?`<div class="ir-time">${e.time}</div>`:''}<button class="ir-del" onclick="delEv('${key}',${i})">✕</button>`;el.appendChild(row);});
}
function addEv(){
  const text=document.getElementById('evInp').value.trim();if(!text)return;
  const time=document.getElementById('evTime').value;const key=selDay||todayStr();
  if(!S.events[key])S.events[key]=[];
  S.events[key].push({text,time,color:selEvCol});
  save();document.getElementById('evInp').value='';document.getElementById('evTime').value='';
  renderEvList();renderCalendar();
}
function delEv(key,i){S.events[key].splice(i,1);save();renderEvList();renderCalendar();}

// ── DAY PANEL TODOS ──
function renderDpTodos(){
  const key=selDay||todayStr();const el=document.getElementById('dpTodoList');el.innerHTML='';
  const items=S.todos.filter(t=>t.date===key);
  if(!items.length){el.innerHTML='<div class="empty-state">这天没有待办</div>';return;}
  items.forEach(t=>{const idx=S.todos.indexOf(t);const cat=TCATS.find(c=>c.id===t.cat)||TCATS[1];const row=document.createElement('div');row.className='item-row td-bg';if(t.done)row.style.opacity='.45';row.innerHTML=`<div class="chk ${t.done?'on':''}" onclick="togTodo(${idx});renderDpTodos();renderCalendar()"></div><div class="ir-txt ${t.done?'done-txt':''}">${t.text}</div><div style="font-size:.63rem;font-weight:800;padding:2px 6px;border-radius:6px;background:${cat.bg};color:${cat.c};">${cat.lbl}</div><button class="ir-del" onclick="delTodo(${idx});renderDpTodos();renderCalendar()">✕</button>`;el.appendChild(row);});
}
function dpAddTodo(){
  const inp=document.getElementById('dpTodoInp');
  const text=inp?inp.value.trim():''; if(!text)return;
  const key=selDay||todayStr();
  S.todos.push({text,cat:'life',date:key,done:false,starred:false});
  save(); inp.value='';
  renderDpTodos(); renderCalendar();
}

// ── DAY PANEL HEALTH ──
const EXLIST2=['🚶走路','🏃跑步','🚴骑行','🧘瑜伽','🏊游泳','💪健身','🤸拉伸'];
function getH(day){const k=hk(day||selDay);if(!S.health[k])S.health[k]={water:0,mood:null,sleep:{},meals:{},exercise:[],note:''};return S.health[k];}
function renderDpHealth(){
  const day=selDay||todayStr();const h=getH(day);
  const mr=document.getElementById('dpMoodRow');mr.innerHTML='';
  MOODS.forEach(m=>{const b=document.createElement('span');b.className='mbtn'+(h.mood===m?' sel':'');b.textContent=m;b.onclick=()=>{h.mood=m;save();renderDpHealth();renderCalendar();if((selDay||todayStr())===todayStr())updateTopBar();};mr.appendChild(b);});
  document.getElementById('dpMoodLbl').textContent=h.mood?`心情: ${h.mood}`:'';
  document.getElementById('dpWNum').textContent=h.water||0;
  const wc=document.getElementById('dpWCups');wc.innerHTML='';
  for(let i=0;i<8;i++){const s=document.createElement('span');s.className='wcup'+(i<(h.water||0)?' on':'');s.textContent='🥤';s.onclick=()=>{h.water=i+1;save();renderDpHealth();renderCalendar();if((selDay||todayStr())===todayStr())updateTopBar();};wc.appendChild(s);}
  if(h.sleep?.bed)document.getElementById('dpSlBed').value=h.sleep.bed;
  if(h.sleep?.wake)document.getElementById('dpSlWake').value=h.sleep.wake;
  if(h.sleep?.hours)document.getElementById('dpSlHrs').textContent=h.sleep.hours.toFixed(1);
  const ec=document.getElementById('dpExChips');ec.innerHTML='';
  EXLIST2.forEach(ex=>{const c=document.createElement('div');c.className='echip'+(h.exercise?.includes(ex)?' on':'');c.textContent=ex;c.onclick=()=>{if(!h.exercise)h.exercise=[];const idx=h.exercise.indexOf(ex);idx>=0?h.exercise.splice(idx,1):h.exercise.push(ex);save();};ec.appendChild(c);});
  const mr2=document.getElementById('dpMealRows');mr2.innerHTML='';
  ['早餐','午餐','晚餐','零食'].forEach(meal=>{const r=document.createElement('div');r.style.cssText='display:flex;gap:7px;align-items:center;margin-bottom:7px;';r.innerHTML=`<div style="font-size:.8rem;font-weight:800;color:var(--ink2);min-width:36px;">${meal}</div><input class="inp sm" id="dpMeal_${meal}" placeholder="吃了什么... 🍱" value="${(h.meals&&h.meals[meal])||''}"/>`;mr2.appendChild(r);});
  document.getElementById('dpNote').value=h.note||'';
}
function dpAddWater(){const h=getH(selDay);h.water=Math.min(8,(h.water||0)+1);save();renderDpHealth();renderCalendar();if((selDay||todayStr())===todayStr())updateTopBar();}
function dpSaveSleep(){const h=getH(selDay);const bed=document.getElementById('dpSlBed').value,wake=document.getElementById('dpSlWake').value;const bh=+bed.split(':')[0],bm=+bed.split(':')[1],wh=+wake.split(':')[0],wm=+wake.split(':')[1];let hrs=(wh*60+wm-(bh*60+bm))/60;if(hrs<0)hrs+=24;h.sleep={bed,wake,hours:hrs};save();renderDpHealth();}
function dpSaveEx(){const h=getH(selDay);h.exerciseMin=document.getElementById('dpExMin').value;save();flash('dpExFlash','✓');}
function dpSaveMeals(){const h=getH(selDay);if(!h.meals)h.meals={};['早餐','午餐','晚餐','零食'].forEach(m=>{const i=document.getElementById('dpMeal_'+m);if(i)h.meals[m]=i.value;});save();flash('dpMealFlash','✓ 保存');}
function dpSaveNote(){const h=getH(selDay);h.note=document.getElementById('dpNote').value;save();flash('dpNoteFlash','✓');}

// ── TODO (standalone view) ──
function renderTodoCats(){
  const el=document.getElementById('todoCats');el.innerHTML='';
  TCATS.forEach(c=>{const b=document.createElement('button');b.className='ccat';b.style.borderColor=c.bg;b.style.color=c.id===actCat?'#fff':c.c;if(c.id===actCat)b.style.background=c.c;b.textContent=c.lbl;b.onclick=()=>{actCat=c.id;renderTodoCats();renderTodoList();};el.appendChild(b);});
}
function renderTodoList(){
  const el=document.getElementById('todoList');el.innerHTML='';
  let items=S.todos.filter(t=>actCat==='all'||t.cat===actCat);
  items.sort((a,b)=>(b.starred?1:0)-(a.starred?1:0));
  if(!items.length){el.innerHTML='<div class="empty-state">空空的 ~ 加一个待办吧 🐻</div>';return;}
  items.forEach(t=>{const cat=TCATS.find(c=>c.id===t.cat)||TCATS[1];const idx=S.todos.indexOf(t);const row=document.createElement('div');row.className='item-row td-bg';if(t.done)row.style.opacity='.45';row.innerHTML=`<div class="chk ${t.done?'on':''}" onclick="togTodo(${idx})"></div><div class="ir-txt ${t.done?'done-txt':''}">${t.text}</div>${t.date?`<div class="ir-time">📅${t.date.slice(5)}</div>`:''}<div style="font-size:.63rem;font-weight:800;padding:2px 6px;border-radius:6px;background:${cat.bg};color:${cat.c};">${cat.lbl}</div><button class="ir-del" onclick="togStar(${idx})">${t.starred?'⭐':'☆'}</button><button class="ir-del" onclick="delTodo(${idx})">✕</button>`;el.appendChild(row);});
}
function addTodo(){
  const text=document.getElementById('todoInp').value.trim();if(!text)return;
  const date=document.getElementById('todoDate').value||'';const cat=actCat==='all'?'life':actCat;
  S.todos.push({text,cat,date,done:false,starred:false});
  save();document.getElementById('todoInp').value='';renderTodoList();renderCalendar();
}
function togTodo(i){S.todos[i].done=!S.todos[i].done;save();renderTodoList();renderCalendar();}
function togStar(i){S.todos[i].starred=!S.todos[i].starred;save();renderTodoList();}
function delTodo(i){S.todos.splice(i,1);save();renderTodoList();renderCalendar();}

// ── HEALTH (standalone view) ──
function renderHealth(){
  const day=todayStr();const k=hk(day);
  if(!S.health[k])S.health[k]={water:0,mood:null,sleep:{},meals:{},exercise:[],note:''};
  const h=S.health[k];
  const mr=document.getElementById('moodRow');mr.innerHTML='';
  MOODS.forEach(m=>{const b=document.createElement('span');b.className='mbtn'+(h.mood===m?' sel':'');b.textContent=m;b.onclick=()=>{h.mood=m;save();renderHealth();renderCalendar();updateTopBar();};mr.appendChild(b);});
  document.getElementById('moodLbl').textContent=h.mood?`今日心情: ${h.mood}`:'';
  document.getElementById('wNum').textContent=h.water||0;
  const wc=document.getElementById('wCups');wc.innerHTML='';
  for(let i=0;i<8;i++){const s=document.createElement('span');s.className='wcup'+(i<(h.water||0)?' on':'');s.textContent='🥤';s.onclick=()=>{h.water=i+1;save();renderHealth();renderCalendar();updateTopBar();};wc.appendChild(s);}
  if(h.sleep?.bed)document.getElementById('slBed').value=h.sleep.bed;
  if(h.sleep?.wake)document.getElementById('slWake').value=h.sleep.wake;
  if(h.sleep?.hours)document.getElementById('slHrs').textContent=h.sleep.hours.toFixed(1);
  const ec=document.getElementById('exChips');ec.innerHTML='';
  EXLIST.forEach(ex=>{const c=document.createElement('div');c.className='echip'+(h.exercise?.includes(ex)?' on':'');c.textContent=ex;c.onclick=()=>{if(!h.exercise)h.exercise=[];const idx=h.exercise.indexOf(ex);idx>=0?h.exercise.splice(idx,1):h.exercise.push(ex);save();};ec.appendChild(c);});
  const mr2=document.getElementById('mealRows');mr2.innerHTML='';
  ['早餐','午餐','晚餐','零食'].forEach(meal=>{const r=document.createElement('div');r.style.cssText='display:flex;gap:7px;align-items:center;margin-bottom:7px;';r.innerHTML=`<div style="font-size:.82rem;font-weight:800;color:var(--ink2);min-width:38px;">${meal}</div><input class="inp sm" id="meal_${meal}" placeholder="吃了什么... 🍱" value="${(h.meals&&h.meals[meal])||''}"/>`;mr2.appendChild(r);});
  document.getElementById('hNote').value=h.note||'';
}
function addWater(){const k=hk(todayStr());if(!S.health[k])S.health[k]={water:0};S.health[k].water=Math.min(8,(S.health[k].water||0)+1);save();renderHealth();renderCalendar();updateTopBar();}
function saveSleep(){const k=hk(todayStr());if(!S.health[k])S.health[k]={};const bed=document.getElementById('slBed').value,wake=document.getElementById('slWake').value;const bh=+bed.split(':')[0],bm=+bed.split(':')[1],wh=+wake.split(':')[0],wm=+wake.split(':')[1];let hrs=(wh*60+wm-(bh*60+bm))/60;if(hrs<0)hrs+=24;S.health[k].sleep={bed,wake,hours:hrs};save();renderHealth();}
function saveEx(){const k=hk(todayStr());if(!S.health[k])S.health[k]={};S.health[k].exerciseMin=document.getElementById('exMin').value;save();flash('exFlash','✓');}
function saveMeals(){const k=hk(todayStr());if(!S.health[k])S.health[k]={meals:{}};if(!S.health[k].meals)S.health[k].meals={};['早餐','午餐','晚餐','零食'].forEach(m=>{const i=document.getElementById('meal_'+m);if(i)S.health[k].meals[m]=i.value;});save();flash('mealFlash','✓ 保存');}
function saveNote(){const k=hk(todayStr());if(!S.health[k])S.health[k]={};S.health[k].note=document.getElementById('hNote').value;save();flash('noteFlash','✓');}

// ── GOALS ──
function renderGoals(){
  const el=document.getElementById('goalList');el.innerHTML='';
  if(!S.goals.length){el.innerHTML='<div class="sec"><div class="empty-state">还没有目标 ~ 创建一个吧 ⭐</div></div>';return;}
  S.goals.forEach((g,i)=>{const pct=Math.min(100,Math.round((g.current/g.target)*100));const sec=document.createElement('div');sec.className='sec';sec.innerHTML=`<div class="g-card" style="background:transparent;padding:0;"><div class="g-row"><div class="g-emoji">${g.emoji||'🎯'}</div><div class="g-name">${g.name}</div><div class="g-pct">${pct}%</div><button class="ir-del" onclick="delGoal(${i})">✕</button></div><div class="g-bar"><div class="g-fill" style="width:${pct}%"></div></div><div class="g-meta"><span>${g.current} / ${g.target} ${g.unit||''}</span><span>${pct>=100?'🎉 完成!':'还差 '+(g.target-g.current)+' '+(g.unit||'')}</span></div><div class="g-btns"><button class="gbtn" onclick="upG(${i},-1)">−</button><button class="gbtn" onclick="upG(${i},1)">+1</button><button class="gbtn" onclick="upG(${i},5)">+5</button><button class="gbtn" onclick="setG(${i})">✏️</button></div></div>`;el.appendChild(sec);});
  renderCalendar();
}
function addGoal(){const name=document.getElementById('gName').value.trim();if(!name)return;const emoji=document.getElementById('gEmoji').value.trim()||'🎯';const target=+document.getElementById('gTarget').value||10;const unit=document.getElementById('gUnit').value.trim();S.goals.push({name,emoji,target,unit,current:0});save();['gName','gEmoji','gUnit'].forEach(id=>document.getElementById(id).value='');renderGoals();}
function upG(i,d){S.goals[i].current=Math.max(0,S.goals[i].current+d);save();renderGoals();}
function setG(i){const v=prompt(`"${S.goals[i].name}" 当前进度:`);if(v!==null&&!isNaN(+v)){S.goals[i].current=+v;save();renderGoals();}}
function delGoal(i){S.goals.splice(i,1);save();renderGoals();}

// ── DESIGN ──
function renderFillPicker(){
  const key=selDay||todayStr();const el=document.getElementById('fillPicker');el.innerHTML='';
  FILL_COLORS.forEach(f=>{const b=document.createElement('div');b.className='mf-btn'+(S.fills[key]===f.c?' sel':'');b.style.background=f.c;b.title=f.lbl;b.onclick=()=>{S.fills[key]=S.fills[key]===f.c?undefined:f.c;if(!S.fills[key])delete S.fills[key];save();renderCalendar();renderFillPicker();};el.appendChild(b);});
}
function clearFill(){const key=selDay||todayStr();delete S.fills[key];save();renderCalendar();renderFillPicker();}
function buildStickerRail(){
  const rail=document.getElementById('stkRail');
  STKS.forEach(url=>{const img=document.createElement('img');img.src=url;img.className='stk-thumb';img.onerror=()=>img.style.display='none';img.onclick=()=>{const key=selDay||todayStr();if(!S.stickers[key])S.stickers[key]=[];S.stickers[key].push(url);save();renderCalendar();renderPlacedStickers();};rail.appendChild(img);});
}
function renderPlacedStickers(){
  const key=selDay||todayStr();const el=document.getElementById('placedStickers');el.innerHTML='';
  const sts=S.stickers[key]||[];
  if(!sts.length){el.innerHTML='<div style="font-size:.78rem;color:var(--ink3);font-weight:600;">还没有贴纸</div>';return;}
  sts.forEach((url,i)=>{const img=document.createElement('img');img.src=url;img.className='placed-stk';img.onerror=()=>img.style.display='none';img.onclick=()=>{S.stickers[key].splice(i,1);save();renderCalendar();renderPlacedStickers();};el.appendChild(img);});
}

// ── INIT ──
window.initApp=function(){
  updateTopDate();
  updateTopBar();
  renderEvDots();
  buildStickerRail();
  const d=new Date();
  selDay=todayStr();
  renderCalendar();
  // init todo view defaults
  actCat='all';
  const td=document.getElementById('todoDate');
  if(td) td.value=todayStr();
  setInterval(updateTopDate,60000);
  setInterval(updateTopBar,60000);
};
</script>
